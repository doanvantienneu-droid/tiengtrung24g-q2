<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Tiếng Trung 24G — Ứng dụng học tập</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--cinnabar:#D9001B;--cinnabar7:#B00016;--gold:#FFD700;--gold-soft:#FCE7A6;--ink:#1A1413;--rice:#FBF7EF;--line:rgba(26,20,19,.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--rice);color:var(--ink);min-height:100vh;
  background-image:radial-gradient(circle at 1px 1px,rgba(26,20,19,.035) 1px,transparent 0);background-size:22px 22px}
.hanzi{font-family:'Noto Serif SC',serif}
.display{font-family:'Bricolage Grotesque',serif}

/* ===== LOGIN ===== */
#login-shell{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 16px 50px -20px rgba(26,20,19,.35);
  padding:30px 26px 28px;max-width:380px;width:100%;text-align:center;position:relative;animation:rise .5s ease}
.login-logo{width:160px;margin:0 auto 6px;display:block}
.login-brand{font-family:'Bricolage Grotesque','Be Vietnam Pro',sans-serif;font-weight:800;font-size:18px;letter-spacing:2px;color:var(--cinnabar);text-align:center;margin-bottom:10px}
.login-dragon{width:130px;margin:0 auto;display:block;filter:drop-shadow(0 8px 16px rgba(217,0,27,.18))}
.login-card h1{font-size:23px;margin-top:6px}
.login-sub{color:rgba(26,20,19,.55);font-size:14px;margin:6px 0 20px}
.login-card label{display:block;text-align:left;font-size:13px;font-weight:600;color:rgba(26,20,19,.7);margin:12px 0 5px}
.login-card input{width:100%;padding:13px 15px;border:2px solid var(--line);border-radius:12px;font-family:inherit;font-size:15px;transition:.2s}
.login-card input:focus{outline:none;border-color:var(--cinnabar)}
.login-btn{width:100%;margin-top:22px;padding:14px;background:var(--cinnabar);color:#fff;border:none;border-radius:13px;
  font-weight:700;font-size:16px;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px -8px rgba(217,0,27,.5);transition:.2s}
.login-btn:active{transform:scale(.97)}

/* ===== HEADER ===== */
#app-shell{display:none}
header{position:sticky;top:0;z-index:50;background:rgba(251,247,239,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav{max-width:900px;margin:0 auto;padding:9px 14px;display:flex;align-items:center;gap:10px}
.nav-logo{height:34px;width:auto}
.brand-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.brand-name{font-family:'Bricolage Grotesque','Be Vietnam Pro',sans-serif;font-weight:800;font-size:10px;letter-spacing:1.5px;color:var(--cinnabar);line-height:1;text-align:center}
.streak{font-size:11px;background:var(--gold-soft);padding:5px 10px;border-radius:99px;font-weight:600;white-space:nowrap}
.acct{display:flex;align-items:center;gap:8px;margin-left:auto}
.acct-av{width:36px;height:36px;border-radius:99px;background:linear-gradient(135deg,#D9001B,#B00016);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.acct-info{line-height:1.15;text-align:right;max-width:120px;overflow:hidden}
.acct-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-cls{font-size:11px;color:rgba(26,20,19,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-out{background:none;border:none;color:rgba(26,20,19,.4);font-size:18px;cursor:pointer;padding:4px 6px;flex-shrink:0}
.acct-out:hover{color:var(--cinnabar)}
.tabs{max-width:900px;margin:0 auto;display:flex;gap:4px;padding:7px 10px;overflow-x:auto}
.tab{flex:1;min-width:76px;padding:9px 6px;border:none;background:transparent;border-radius:11px;font-family:inherit;font-size:12.5px;font-weight:600;color:rgba(26,20,19,.5);cursor:pointer;transition:.2s;white-space:nowrap}
.tab.active{background:var(--cinnabar);color:#fff;box-shadow:0 4px 16px -6px rgba(217,0,27,.4)}

/* ===== MAIN ===== */
main{max-width:900px;margin:0 auto;padding:16px 16px 48px}
.screen{display:none;animation:rise .35s ease}
.screen.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
h1.title{font-family:'Bricolage Grotesque';font-weight:800;font-size:25px;margin-bottom:4px}
.sub{color:rgba(26,20,19,.55);font-size:14px;margin-bottom:16px}
.sec-title{font-family:'Bricolage Grotesque';font-size:18px;margin:18px 0 12px}

/* Hero */
.hero{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,#fff,#FFF6F0);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 30px -16px rgba(26,20,19,.2);overflow:hidden}
.hero-dragon{width:92px;height:auto;flex-shrink:0;filter:drop-shadow(0 6px 12px rgba(217,0,27,.18))}
.hero-text h1{font-size:22px;line-height:1.15}
.hero-text p{color:rgba(26,20,19,.6);font-size:14px;margin-top:3px}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.hero-stats span{font-size:12px;background:var(--gold-soft);padding:4px 10px;border-radius:99px;font-weight:600}

/* Lesson grid */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:11px}
.lcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;transition:.2s;text-align:left}
.lcard:hover,.lcard:active{border-color:var(--cinnabar);transform:translateY(-2px);box-shadow:0 8px 28px -12px rgba(26,20,19,.3)}
.lcard .num{display:inline-flex;width:30px;height:30px;align-items:center;justify-content:center;background:var(--cinnabar);color:#fff;border-radius:8px;font-weight:700;font-size:14px;margin-bottom:8px;font-family:'Bricolage Grotesque'}
.lcard .lz{font-family:'Noto Serif SC';font-weight:700;font-size:17px;line-height:1.2}
.lcard .lp{font-size:11px;color:rgba(26,20,19,.5);margin-top:2px}
.lcard .lc{font-size:11px;color:var(--cinnabar);margin-top:7px;font-weight:600}

.src-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* Flashcard */
.fc-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:14px;color:rgba(26,20,19,.6)}
.chip{background:var(--gold-soft);padding:4px 11px;border-radius:99px;font-size:12px;font-weight:600}
.flip{perspective:1500px;height:290px;cursor:pointer;margin-bottom:8px}
.fi{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.fi.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 40px -14px rgba(26,20,19,.28)}
.front{background:#fff;border:1px solid var(--line)}
.back-f{background:linear-gradient(135deg,#fff,#FFF1F2);border:1px solid rgba(217,0,27,.3);transform:rotateY(180deg);text-align:center;padding:28px}
.fh{font-family:'Noto Serif SC';font-size:72px;font-weight:700;line-height:1}
.fp{margin-top:14px;font-size:20px;color:var(--cinnabar)}
.fm{font-size:24px;font-weight:700}
.fe{font-family:'Noto Serif SC';margin-top:14px;font-size:18px;color:rgba(26,20,19,.6)}
.spk{background:rgba(217,0,27,.1);border:none;color:var(--cinnabar);width:46px;height:46px;border-radius:99px;cursor:pointer;font-size:20px;display:inline-flex;align-items:center;justify-content:center}
.spk.sm{width:32px;height:32px;font-size:14px;vertical-align:middle}
.front .spk{margin-top:18px}
.tap-hint{position:absolute;bottom:14px;font-size:11px;color:rgba(26,20,19,.35)}
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px}
.g{padding:13px 4px;border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;transition:.15s}
.g:active{transform:scale(.96)}
.g0{background:rgba(26,20,19,.8)}.g1{background:var(--cinnabar)}.g2{background:#f59e0b}.g3{background:#059669}
.reveal{width:100%;padding:14px;border:2px solid var(--cinnabar);background:transparent;color:var(--cinnabar);border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-top:14px}
.reveal:active{background:var(--cinnabar);color:#fff}

/* Quiz */
.q-progress{height:7px;background:rgba(26,20,19,.1);border-radius:99px;margin-bottom:10px;overflow:hidden}
.q-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--cinnabar),var(--gold));transition:width .3s;border-radius:99px}
.q-typebadge{font-size:12px;font-weight:700;color:var(--cinnabar);background:#FFF1F2;display:inline-block;padding:4px 12px;border-radius:99px;margin-bottom:14px}
.fc-emoji{font-size:56px;line-height:1;margin-bottom:6px}
.q-timer{text-align:right;font-weight:800;font-size:17px;color:var(--ink);margin-bottom:6px;font-family:'Bricolage Grotesque'}
.q-timer.danger{color:var(--cinnabar);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.ex-blank{font-family:'Noto Serif SC';font-size:30px;font-weight:700;margin-top:10px;line-height:1.5}
.ex-line{font-family:'Noto Serif SC';font-size:30px;font-weight:700;margin-top:14px;line-height:2;text-align:center}
.ex-inline{font-family:'Noto Serif SC';font-size:28px;font-weight:700;text-align:center;border:none;border-bottom:3px solid var(--cinnabar);background:#FFF7F7;color:var(--cinnabar);padding:0 4px;margin:0 2px;outline:none;vertical-align:baseline;min-width:1.6em}
.ex-inline:focus{background:#FFEDED}
.ex-inline.ex-ok{color:#047857;border-bottom-color:#047857;background:#ecfdf5}
.ex-inline.ex-no{color:var(--cinnabar);border-bottom-color:var(--cinnabar);background:#FFF1F2}
/* quiz mode menu */
.quiz-modes{display:flex;flex-direction:column;gap:11px;margin-bottom:16px}
.qmode{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:0 6px 24px -16px rgba(26,20,19,.2)}
.qmode-title{font-family:'Bricolage Grotesque';font-weight:700;font-size:17px}
.qmode-desc{font-size:13px;color:rgba(26,20,19,.55);margin-top:2px}
.qmode-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.qm-btn{flex:1;min-width:120px;padding:11px;border:2px solid var(--line);background:#fff;border-radius:11px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:.15s;color:var(--ink)}
.qm-btn:hover{border-color:var(--cinnabar)}
.qm-lesson{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar)}
.q-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 8px 30px -16px rgba(26,20,19,.2)}
.q-prompt{text-align:center;margin-bottom:18px}
.q-prompt .qh{font-family:'Noto Serif SC';font-size:54px;font-weight:700;line-height:1.1}
.q-prompt .qp{color:var(--cinnabar);font-size:16px;margin-top:6px}
.q-prompt .qq{font-size:16px;font-weight:600;margin-top:10px}
.opts{display:grid;gap:10px}
.opt{padding:15px;border:2px solid var(--line);border-radius:13px;background:#fff;font-family:inherit;font-size:15px;cursor:pointer;text-align:left;transition:.15s;font-weight:500}
.opt:hover{border-color:var(--cinnabar)}
.opt.correct{border-color:#059669;background:#ecfdf5;color:#047857;font-weight:700}
.opt.wrong{border-color:var(--cinnabar);background:#FFF1F2;color:var(--cinnabar)}
.opt:disabled{cursor:default}
.q-next{width:100%;margin-top:16px;padding:14px;background:var(--cinnabar);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;display:none}
.q-next.show{display:block}
.w-next.show{display:block}
/* nhãn hướng dẫn rõ ràng cho mỗi dạng bài */
.ex-q-label{font-size:16px;font-weight:800;color:var(--cinnabar);margin-bottom:12px;text-align:center}
/* phần Dịch câu: thẻ câu hỏi đẹp */
.trans-card{background:linear-gradient(135deg,#FFF7ED,#FFF1F2);border:2px solid var(--line);border-radius:18px;padding:20px 18px;text-align:center;margin-bottom:16px;box-shadow:0 6px 20px -12px rgba(217,0,27,.25)}
.trans-label{font-size:14px;font-weight:800;color:var(--cinnabar);margin-bottom:10px;letter-spacing:.3px}
.trans-vi{font-size:21px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:16px}
.listen-btn{display:inline-flex;align-items:center;gap:8px;background:var(--cinnabar);color:#fff;border:none;border-radius:99px;padding:11px 22px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 14px -4px rgba(217,0,27,.5);transition:.15s}
.listen-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px -4px rgba(217,0,27,.6)}
.listen-btn:active{transform:scale(.97)}
/* ô gõ dịch to, chữ to đen, bo góc */
.trans-input{width:100%;box-sizing:border-box;padding:18px 18px;font-size:26px;font-weight:700;color:#1a1413;border:2.5px solid var(--line);border-radius:16px;outline:none;text-align:center;background:#fff;transition:.15s}
.trans-input:focus{border-color:var(--cinnabar);box-shadow:0 0 0 4px rgba(217,0,27,.1)}
.trans-input::placeholder{color:#bbb;font-weight:500;font-size:18px}
.q-check{width:100%;margin-top:14px;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
/* fill / translate */
.fill-clue{display:flex;flex-direction:column;gap:4px;align-items:center;margin:6px 0 10px}
.fill-py{color:var(--cinnabar);font-size:22px;font-weight:600}
.fill-m{font-size:17px;font-weight:600}
.fill-input{width:100%;padding:15px;border:2px solid var(--line);border-radius:13px;font-size:30px;text-align:center;transition:.2s}
.fill-input:focus{outline:none;border-color:var(--cinnabar)}
.trans-vi{font-size:24px;font-weight:700;margin:8px 0}
.q-result{margin-top:12px;text-align:center}
.res-ok{color:#047857;font-weight:700;font-size:16px;background:#ecfdf5;padding:11px;border-radius:11px}
.res-no{color:var(--cinnabar);font-weight:600;font-size:15px;background:#FFF1F2;padding:11px;border-radius:11px}
.res-ok .hanzi,.res-no .hanzi{font-size:22px}
/* match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:flex;flex-direction:column;gap:9px}
.match-item{padding:14px 8px;border:2px solid var(--line);border-radius:12px;background:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.match-item.hanzi{font-family:'Noto Serif SC';font-size:24px}
.match-item.sel{border-color:var(--cinnabar);background:#FFF1F2}
.match-item.done{opacity:.35;border-color:#059669;background:#ecfdf5}
/* arrange */
.arrange-answer{min-height:58px;border:2px dashed rgba(217,0,27,.3);border-radius:13px;padding:10px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:12px}
.arr-placeholder{color:rgba(26,20,19,.35);font-size:13px}
.arrange-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.tok{padding:11px 15px;border:2px solid var(--line);border-radius:11px;background:#fff;font-size:22px;cursor:pointer;transition:.15s;font-weight:600}
.tok:hover{border-color:var(--cinnabar)}
.tok.used{opacity:.25;cursor:default}
.tok-ans{border-color:var(--cinnabar);background:#FFF1F2}
/* GAME ghép bộ thủ */
.game-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:14px;font-weight:600}
.game-hud .gscore{color:var(--cinnabar)}
.game-hud .gcombo{background:var(--gold);padding:3px 11px;border-radius:99px;font-size:12px}
.game-target{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;text-align:center;box-shadow:0 8px 30px -16px rgba(26,20,19,.2);margin-bottom:16px}
.game-target .gt-label{font-size:13px;color:rgba(26,20,19,.5)}
.game-target .gt-meaning{font-size:22px;font-weight:700;margin:6px 0}
.game-target .gt-slots{display:flex;gap:10px;justify-content:center;margin-top:14px;min-height:74px;align-items:center}
.gslot{width:64px;height:64px;border:2px dashed rgba(217,0,27,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC';font-size:34px;background:var(--rice);color:rgba(26,20,19,.25)}
.gslot.filled{border-style:solid;border-color:#059669;background:#ecfdf5;color:var(--ink)}
.game-target .gt-preview{font-family:'Noto Serif SC';font-size:44px;margin-top:10px;min-height:52px;color:var(--cinnabar);font-weight:700}
.game-pool{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.gtile{min-width:64px;height:64px;padding:0 10px;border:2px solid var(--line);border-radius:14px;background:#fff;font-family:'Noto Serif SC';font-size:32px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.gtile:hover{border-color:var(--cinnabar);transform:translateY(-2px)}
.gtile .gtile-name{font-family:'Be Vietnam Pro';font-size:10px;color:rgba(26,20,19,.45);margin-top:2px;font-weight:500}
.gtile.used{opacity:.25;pointer-events:none}
.gtile.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.game-feedback{text-align:center;font-weight:700;font-size:16px;margin:12px 0;min-height:24px}
.game-feedback.ok{color:#047857}.game-feedback.no{color:var(--cinnabar)}
.game-actions{display:flex;gap:9px;margin-top:6px}
.game-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;font-family:inherit;font-size:14px;cursor:pointer}
.g-skip{background:transparent;border:2px solid var(--line)!important;color:rgba(26,20,19,.6)}
.g-hint{background:var(--gold-soft);color:var(--ink)}

/* Write */
.w-prompt{text-align:center;margin-bottom:12px}
.w-prompt .wh{font-family:'Noto Serif SC';font-size:54px;font-weight:700;color:var(--cinnabar)}
.w-prompt .wp{color:rgba(26,20,19,.55);margin-top:4px;font-size:14px}
.w-strokecount{margin-top:8px;font-size:14px;background:var(--gold-soft);display:inline-block;padding:5px 14px;border-radius:99px}
.w-ruleBtn{margin:12px auto 0;display:block;background:transparent;border:2px solid var(--line);border-radius:11px;padding:9px 16px;font-family:inherit;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer}
.w-ruleBtn:hover{border-color:var(--cinnabar)}
.w-rules{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.wr-title{font-weight:700;font-size:14px;margin-bottom:10px;color:var(--cinnabar)}
.wr-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-top:1px solid var(--line)}
.wr-item:first-of-type{border-top:none}
.wr-num{font-size:20px;flex-shrink:0}
.wr-desc{font-size:13px;color:rgba(26,20,19,.6)}
.wr-desc .hanzi,.wr-item b{font-size:14px}
.canvas-wrap{position:relative;width:280px;height:280px;margin:0 auto}
canvas{border:2px dashed rgba(217,0,27,.3);border-radius:16px;background:#fff;touch-action:none;display:block;width:280px;height:280px}
.gl{position:absolute;background:rgba(217,0,27,.13);pointer-events:none}
.glv{left:50%;top:8px;bottom:8px;width:1px;transform:translateX(-.5px)}
.glh{top:50%;left:8px;right:8px;height:1px;transform:translateY(-.5px)}
.w-ghost{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC';font-size:200px;color:rgba(26,20,19,.07);pointer-events:none;font-weight:700}
.w-row{display:flex;gap:9px;margin-top:14px;max-width:280px;margin-left:auto;margin-right:auto}
.w-row button{flex:1;padding:12px 6px;border-radius:12px;font-weight:600;font-family:inherit;font-size:13.5px;cursor:pointer;border:none}
.w-clear{background:transparent;border:2px solid var(--line)!important;color:rgba(26,20,19,.6)}
.w-show{background:var(--ink);color:#fff}
.w-rate{background:var(--cinnabar);color:#fff}
.w-next{background:#059669;color:#fff}

/* Vocab */
.v-search{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:13px;font-family:inherit;font-size:15px;margin-bottom:14px;background:#fff}
.v-search:focus{outline:none;border-color:var(--cinnabar)}
.v-item{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 16px;margin-bottom:8px}
.v-item .vh{font-family:'Noto Serif SC';font-size:28px;font-weight:700;min-width:50px}
.v-item .vmeta{flex:1;min-width:0}
.v-item .vp{color:var(--cinnabar);font-size:13px}
.v-item .vm{font-weight:500;font-size:15px}
.v-item .vspk{background:rgba(217,0,27,.08);border:none;color:var(--cinnabar);width:38px;height:38px;border-radius:99px;cursor:pointer;flex-shrink:0;font-size:16px}

/* Scorecard / done */
.center-box,.scorecard{text-align:center;padding:36px 20px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 30px -16px rgba(26,20,19,.2);margin-top:8px}
.center-box .big{font-size:54px}
.center-box h2{font-family:'Bricolage Grotesque';font-size:24px;margin-top:10px}
.center-box p{color:rgba(26,20,19,.55);margin-top:8px}
.center-box button{margin-top:20px;padding:13px 24px;background:var(--cinnabar);color:#fff;border:none;border-radius:12px;font-weight:700;font-family:inherit;cursor:pointer;font-size:15px}
.score-dragon{width:110px;margin:0 auto 4px;display:block;filter:drop-shadow(0 8px 14px rgba(217,0,27,.2))}
.score-big{font-family:'Bricolage Grotesque';font-size:54px;font-weight:800;color:var(--cinnabar);line-height:1}
.score-detail{font-size:16px;font-weight:600;margin-top:4px}
.score-name{font-size:13px;color:rgba(26,20,19,.55);margin-top:6px;background:var(--rice);display:inline-block;padding:5px 14px;border-radius:99px}
.score-msg{font-size:18px;margin-top:14px;font-weight:600}
.footer{text-align:center;font-size:11px;color:rgba(26,20,19,.4);padding:18px}
@media(max-width:480px){.fh{font-size:60px}.q-prompt .qh{font-size:44px}.acct-info{max-width:84px}}

/* ===== LUYỆN NÓI + GIÁO VIÊN (thêm) ===== */
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 8px 28px -22px rgba(26,20,19,.4)}
.note-line{font-size:13px;color:rgba(26,20,19,.6);line-height:1.5;margin:4px 0}
.pill-row{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0}
.pill{padding:8px 13px;border:1.5px solid var(--line);background:#fff;border-radius:99px;font-family:inherit;font-size:13px;font-weight:600;color:rgba(26,20,19,.65);cursor:pointer;transition:.15s}
.pill.on{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar);box-shadow:0 5px 16px -7px rgba(217,0,27,.5)}
.btn-primary{padding:12px 18px;background:var(--cinnabar);color:#fff;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 8px 22px -10px rgba(217,0,27,.55);transition:.15s}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{padding:10px 14px;background:#fff;color:rgba(26,20,19,.75);border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:.15s}
.btn-ghost:active{transform:scale(.97)}
.seg{display:flex;gap:5px;background:#F2ECE0;border-radius:13px;padding:5px;margin:12px 0;flex-wrap:wrap}
.seg button{flex:1;min-width:96px;padding:9px 6px;border:none;background:transparent;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;color:rgba(26,20,19,.6);cursor:pointer;transition:.15s}
.seg button.on{background:#fff;color:var(--cinnabar);box-shadow:0 3px 10px -5px rgba(26,20,19,.4)}
.sp-item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 8px 26px -22px rgba(26,20,19,.4)}
.sp-zh{font-size:24px;font-weight:700;line-height:1.35}
.sp-py{font-size:14px;color:var(--cinnabar);font-weight:600;margin-top:2px}
.sp-vi{font-size:14px;color:rgba(26,20,19,.6);margin-top:2px}
.sp-actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.sp-btn{flex:1;min-width:96px;padding:10px 8px;border:1.5px solid var(--line);background:#fff;border-radius:11px;font-family:inherit;font-size:13.5px;font-weight:600;color:rgba(26,20,19,.75);cursor:pointer;transition:.15s}
.sp-btn:active{transform:scale(.97)}
.sp-btn.rec{border-color:rgba(217,0,27,.45);color:var(--cinnabar)}
.sp-btn.recording{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar);animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,0,27,.4)}50%{box-shadow:0 0 0 8px rgba(217,0,27,0)}}
.sp-result{margin-top:12px}
.sp-score{display:flex;align-items:center;gap:12px;margin:6px 0}
.sp-score-num{font-family:'Bricolage Grotesque';font-size:38px;font-weight:800;min-width:64px;text-align:center}
.sp-score-bar{flex:1;height:11px;background:#EFE7D8;border-radius:99px;overflow:hidden}
.sp-score-bar i{display:block;height:100%;border-radius:99px;transition:width .5s}
.sub-row{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.subm{flex:1;min-width:68px;background:#FBF7EF;border:1px solid var(--line);border-radius:12px;padding:9px 6px;text-align:center}
.subm-n{font-family:'Bricolage Grotesque';font-size:22px;font-weight:800;line-height:1}
.subm-l{font-size:11px;color:rgba(26,20,19,.55);margin-top:3px}
.sp-chars{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;font-size:26px;line-height:1.3}
.sp-ch{font-family:'Noto Serif SC',serif}
.sp-ch.ok{color:#059669}
.sp-ch.bad{color:#D9001B;text-decoration:underline wavy #D9001B}
.sp-ch.miss{color:rgba(26,20,19,.3)}
.pyhint{font-size:12px;color:var(--cinnabar);margin:0 6px 0 1px;vertical-align:super}
.sp-fb{background:#FBF7EF;border-radius:11px;padding:10px 12px;font-size:13.5px;line-height:1.5;margin:8px 0}
.trophy{border-radius:16px;padding:16px;text-align:center;color:#fff}
.trophy.ok{background:linear-gradient(135deg,#059669,#047857)}
.trophy.no{background:linear-gradient(135deg,#D9001B,#B00016)}
.trophy-ic{font-size:38px;line-height:1}
.trophy-t{font-family:'Bricolage Grotesque';font-size:22px;font-weight:800;margin-top:4px}
.trophy-s{font-size:13px;opacity:.92;margin-top:3px}
.ln-row{background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin:8px 0}
.ln-head{display:flex;align-items:center;gap:10px}
.ln-zh{font-size:18px;font-weight:700;flex:1}
.ln-score{font-family:'Bricolage Grotesque';font-size:22px;font-weight:800}
.ln-wrong{font-size:13px;color:rgba(26,20,19,.7);margin-top:5px}
.sec-head{font-family:'Bricolage Grotesque';font-size:17px;margin:16px 0 8px}
.field-label{display:block;font-size:13px;font-weight:600;color:rgba(26,20,19,.7);margin:12px 0 5px}
.field-input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-family:inherit;font-size:15px;transition:.15s}
.field-input:focus{outline:none;border-color:var(--cinnabar)}
.ai-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.ai-on{background:#ECFDF5;color:#047857}
.ai-off{background:#FEF2F2;color:#B00016}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--cinnabar);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.tc-stat{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.tcs{flex:1;min-width:76px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 8px 24px -22px rgba(26,20,19,.4)}
.tcs-n{font-family:'Bricolage Grotesque';font-size:24px;font-weight:800;line-height:1}
.tcs-l{font-size:11px;color:rgba(26,20,19,.55);margin-top:4px}
.tc-row{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:8px 0}
.tcr-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tcr-name{font-weight:700;font-size:15px}
.tcr-meta{font-size:12.5px;color:rgba(26,20,19,.6);margin-left:auto}
.tcr-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tcr-badge{font-size:13px;padding:3px 8px;border-radius:8px;background:#FEF2F2;color:#B00016;font-weight:600}
.tcr-badge.zh{font-family:'Noto Serif SC',serif}
.tc-empty{text-align:center;color:rgba(26,20,19,.5);padding:26px 14px;font-size:14px}


/* ===== TRANG CHỦ kiểu Quyển 1 + Đọc cả bài ===== */
.feat-scroll{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin:4px 0 18px}
.fcard{border:none;border-radius:20px;padding:16px 15px;text-align:left;cursor:pointer;color:#fff;position:relative;overflow:hidden;min-height:106px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 12px 26px -14px rgba(0,0,0,.42);transition:.18s;font-family:inherit}
.fcard:active{transform:scale(.97)}
.fcard:hover{transform:translateY(-3px)}
.fcard .fc-ic{font-size:30px}
.fcard .fc-ti{font-weight:800;font-size:16px;margin-top:8px}
.fcard .fc-sub{font-size:12px;opacity:.92;margin-top:1px}
.fcard .fc-ar{position:absolute;right:13px;bottom:13px;width:26px;height:26px;border-radius:99px;background:rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.fcard::after{content:"";position:absolute;right:-34px;top:-34px;width:120px;height:120px;border-radius:99px;background:rgba(255,255,255,.13)}
.g-red{background:linear-gradient(135deg,#FF566A,#D9001B)}
.g-orange{background:linear-gradient(135deg,#FFB347,#F5821F)}
.g-purple{background:linear-gradient(135deg,#A974FF,#7C3AED)}
.g-blue{background:linear-gradient(135deg,#54A0FF,#2563EB)}
.g-green{background:linear-gradient(135deg,#34D399,#0EA371)}
.g-pink{background:linear-gradient(135deg,#FF7EB3,#EC4899)}
.g-teal{background:linear-gradient(135deg,#22D3EE,#0E7490)}
.hero24{position:relative;background:linear-gradient(135deg,#E80C24,#A30016);border-radius:26px;padding:24px 22px;color:#fff;overflow:hidden;box-shadow:0 18px 42px -20px rgba(217,0,27,.65);margin-bottom:22px}
.hero24::before{content:"汉语";position:absolute;right:-4px;bottom:-34px;font-family:'Noto Serif SC';font-size:148px;font-weight:900;color:rgba(255,255,255,.07);line-height:1}
.hero24 .h24-badge{display:inline-block;background:rgba(255,255,255,.18);color:#FFD700;font-weight:800;font-size:11.5px;padding:6px 13px;border-radius:99px;letter-spacing:.4px;position:relative}
.hero24 h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:28px;line-height:1.08;margin:13px 0 6px;position:relative}
.hero24 p{font-size:14px;opacity:.95;position:relative}
.hero24 .h24-stats{display:flex;gap:9px;margin-top:16px;position:relative;flex-wrap:wrap}
.h24-stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 14px;text-align:center}
.h24-stat b{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;display:block}
.h24-stat span{font-size:11px;opacity:.9}
.hero24 .h24-cta{margin-top:17px;background:#FFD700;color:#7A0010;border:none;font-weight:800;font-size:15px;padding:13px 22px;border-radius:14px;cursor:pointer;font-family:inherit;box-shadow:0 10px 22px -10px rgba(0,0,0,.45);position:relative}
.hero24 .h24-cta:active{transform:scale(.97)}
.hero24 .h24-dragon{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:118px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.32))}
@media(max-width:600px){.hero24 .h24-dragon{width:90px;opacity:.55;right:-6px}.hero24 h1{font-size:24px}}
.sec-head{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;margin:6px 0 14px;display:flex;align-items:center;gap:8px;scroll-margin-top:120px}
.lesson-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.lcard{border:1px solid rgba(217,0,27,.1);border-radius:18px;padding:15px;box-shadow:0 10px 24px -16px rgba(217,0,27,.32)}
.lcard:hover,.lcard:active{border-color:var(--cinnabar);transform:translateY(-3px);box-shadow:0 14px 30px -14px rgba(217,0,27,.42)}
.lcard .num{background:linear-gradient(135deg,#FF566A,#D9001B);box-shadow:0 6px 14px -6px rgba(217,0,27,.6)}
.kw-box{background:#FBF7EF;border:1px solid var(--line);border-radius:13px;padding:14px 16px;font-size:19px;line-height:1.95}
.lh-num{display:inline-flex;width:34px;height:34px;align-items:center;justify-content:center;background:var(--cinnabar);color:#fff;border-radius:10px;font-weight:800;font-family:'Bricolage Grotesque';flex-shrink:0}


.kw-row{padding:2px 0;font-size:18px;line-height:1.7}
.kw-spk{display:inline-block;min-width:42px;color:var(--cinnabar);font-weight:700;font-size:12.5px;margin-right:6px}
.kw-stage{color:rgba(26,20,19,.5);font-size:15px;font-style:italic}
</style>

g": "📖"}, {"h": "节", "p": "jié", "m": "tiết", "e": "我们早上有两节课", "img": "📖"}, {"h": "教室", "p": "jiàoshì", "m": "phòng học", "e": "十点半我去教室", "img": "📖"}, {"h": "操场", "p": "cāochǎng", "m": "sân vận động", "e": "下午四点我去操场", "img": "📖"}, {"h": "锻炼", "p": "duànliàn", "m": "luyện tập", "e": "下午四点半我去操场锻炼身体", "img": "📖"}, {"h": "洗澡", "p": "xǐzǎo", "m": "tắm", "e": "洗澡以后我常吃饭", "img": "📖"}, {"h": "然后", "p": "ránhòu", "m": "sau đó", "e": "然后我喝一杯咖啡", "img": "📖"}, {"h": "睡觉", "p": "shuìjiào", "m": "ngủ", "e": "晚上十一点我睡觉", "img": "📖"}, {"h": "爬", "p": "pá", "m": "leo, bò", "e": "明天我们班去爬山", "img": "📖"}, {"h": "年级", "p": "niánjí", "m": "năm học", "e": "一年级老师和学生一起去爬山", "img": "📖"}, {"h": "出发", "p": "chūfā", "m": "xuất phát", "e": "明天几点出发", "img": "📖"}, {"h": "前", "p": "qián", "m": "trước", "e": "吃饭以前你们要洗手", "img": "📖"}, {"h": "准时", "p": "zhǔnshí", "m": "đúng giờ", "e": "大家准时上车", "img": "📖"}, {"h": "集合", "p": "jíhé", "m": "tập hợp", "e": "你们在楼前集合上车", "img": "📖"}, {"h": "刻", "p": "kè", "m": "mười lăm phút", "e": "八点一刻准时上车", "img": "📖"}, {"h": "带", "p": "dài", "m": "mang", "e": "中午不回来要带午饭", "img": "📖"}, {"h": "山本", "p": "Shānběn", "m": "yamahon", "e": "山本你什么时候回来", "img": "📖"}], "sentences": [{"zh": "每天八点我去学校。", "vi": "Hàng ngày tám giờ tôi đi học.", "alt": []}, {"zh": "每天早上七点我吃饭。", "vi": "Hàng ngày bảy giờ sáng tôi ăn cơm.", "alt": []}, {"zh": "我每天早上六点半起床。", "vi": "Hàng ngày tôi thức dậy lúc sáu giờ rưỡi sáng.", "alt": []}, {"zh": "早上我不吃早饭。", "vi": "Buổi sáng tôi không ăn sáng.", "alt": []}, {"zh": "起床以后你做什么？", "vi": "Sau khi thức dậy bạn làm gì?", "alt": []}, {"zh": "九点十五分我上课。", "vi": "Chín giờ mười lăm tôi vào học.", "alt": []}, {"zh": "我们早上有两节课。", "vi": "Buổi sáng chúng tôi có hai tiết học.", "alt": []}, {"zh": "下午四点我去操场。", "vi": "Bốn giờ chiều tôi ra sân vận động.", "alt": []}, {"zh": "下午四点半我去操场锻炼身体。", "vi": "Bốn giờ rưỡi chiều tôi ra sân tập thể dục.", "alt": []}, {"zh": "明天我们去爬山。", "vi": "Ngày mai chúng ta đi leo núi.", "alt": []}, {"zh": "每天早上六点半我学英语。", "vi": "Hàng ngày sáu giờ rưỡi sáng tôi học tiếng Anh.", "alt": []}, {"zh": "差十五分八点我去学校。", "vi": "Tám giờ kém mười lăm tôi đi học.", "alt": []}, {"zh": "十点半我去教室。", "vi": "Mười giờ rưỡi tôi đến lớp học.", "alt": []}, {"zh": "晚上十一点我睡觉。", "vi": "Mười một giờ tối tôi đi ngủ.", "alt": []}, {"zh": "明天我们班去爬山。", "vi": "Ngày mai lớp chúng tôi đi leo núi.", "alt": []}], "kewen": "（一）我的一天\n我每天早上六点半起床，七点吃早饭。差十分八点我去教室，八点上课。上午我们有四节课，十二点下课。中午我去食堂吃午饭。午饭以后，我常常去朋友那儿聊天儿。下午没有课的时候，我常去图书馆看书，或者跟中国朋友一起练习口语。有时候在网上看电影或电视剧。四点我去操场锻炼身体。五点回宿舍洗澡，洗衣服，六点半或者七点吃晚饭。晚上我做练习，写汉字，预习课文和生词，然后上上网，听听音乐，十一点睡觉。\n（二）明天早上七点一刻出发\n老师：同学们，明天我们去爬山。\n山本：太好了！老师，您去吗？\n老师：去。一年级的老师和学生都去。\n山本：明天什么时候出发？\n老师：明天早上七点在楼前集合上车，七点一刻准时出发。\n山本：中午回来吗？\n老师：不回来，要带午饭。\n山本：什么时候回来？\n老师：下午四点。"}, {"n": 22, "zh": "谈谈自己的爱好", "py": "", "vi": "Nói về sở thích của mình", "vocab": [{"h": "谈", "p": "tán", "m": "nói", "e": "请大家谈谈自己的爱好", "img": "📖"}, {"h": "自己", "p": "zìjǐ", "m": "tự mình", "e": "今天我自己做饭", "img": "📖"}, {"h": "爱好", "p": "àihào", "m": "sở thích", "e": "请大家谈谈自己的爱好", "img": "❤️"}, {"h": "叫", "p": "jiào", "m": "gọi, kêu", "e": "爸爸叫我去买水果", "img": "📖"}, {"h": "让", "p": "ràng", "m": "cho phép", "e": "老师让我先说吧", "img": "📖"}, {"h": "大家", "p": "dàjiā", "m": "mọi người", "e": "大家好我叫玛丽", "img": "📖"}, {"h": "京剧", "p": "jīngjù", "m": "kinh kịch", "e": "我喜欢看京剧", "img": "📖"}, {"h": "喜欢", "p": "xǐhuan", "m": "thích", "e": "我喜欢看中国电影", "img": "😍"}, {"h": "非常", "p": "fēicháng", "m": "vô cùng", "e": "我非常喜欢看京剧", "img": "📖"}, {"h": "唱", "p": "chàng", "m": "hát", "e": "我打算请老师教我唱京剧", "img": "📖"}, {"h": "玩", "p": "wán", "m": "chơi", "e": "我喜欢玩游戏", "img": "📖"}, {"h": "电脑", "p": "diànnǎo", "m": "máy tính", "e": "我喜欢玩电脑", "img": "📖"}, {"h": "游戏", "p": "yóuxì", "m": "game", "e": "我喜欢玩游戏", "img": "📖"}, {"h": "下课", "p": "xiàkè", "m": "tan học", "e": "下课以后我常玩电脑", "img": "📖"}, {"h": "感到", "p": "gǎndào", "m": "cảm thấy", "e": "我感到很高兴", "img": "📖"}, {"h": "心情", "p": "xīnqíng", "m": "tâm trạng", "e": "听音乐以后我感到心情很高兴", "img": "📖"}, {"h": "愉快", "p": "yúkuài", "m": "vui vẻ", "e": "我感到心情很愉快", "img": "📖"}, 老师教我。\n老师：麦克，你喜欢做什么？\n麦克：我喜欢玩儿电脑游戏。\n老师：罗兰呢？\n罗兰：我喜欢听音乐。下课以后，听听音乐或者跟朋友聊聊天儿，感到心情很愉快。\n老师：田中业余时间常常做什么？\n田中：我来中国以前就对书法特别感兴趣。今年公司派我来中国，我非常高兴。现在我正跟一个老师学书法，还学画中国画儿。"}, {"n": 23, "zh": "去博物馆怎么走？", "py": "", "vi": "Đi đến viện bảo tàng thế nào?", "vocab": [{"h": "后边", "p": "hòubian", "m": "phía sau", "e": "前边是图书馆", "img": "📖"}, {"h": "外边", "p": "wàibian", "m": "bên ngoài", "e": "箱子里有书", "img": "📖"}, {"h": "下边", "p": "xiàbian", "m": "bên dưới", "e": "桌子上有一本书", "img": "📖"}, {"h": "右边", "p": "yòubian", "m": "bên phải", "e": "我坐在玛丽右边", "img": "📖"}, {"h": "离", "p": "lí", "m": "cách", "e": "我家离公司米", "img": "↔️"}, {"h": "近", "p": "jìn", "m": "gần", "e": "我家离公司很远", "img": "📍"}, {"h": "地方", "p": "dìfang", "m": "địa điểm", "e": "图书馆在什么地方", "img": "🗺️"}, {"h": "足球场", "p": "zúqiúchǎng", "m": "sân bóng", "e": "学校西边是足球场", "img": "🥅"}, {"h": "劳驾", "p": "láojià", "m": "làm phiền", "e": "劳驾请问去超市怎么走", "img": "🙏"}, {"h": "打听", "p": "dǎtīng", "m": "hỏi dò", "e": "劳驾我打听一下儿足球场在什么地方", "img": "📖"}, {"h": "博物馆", "p": "bówùguǎn", "m": "viện bảo tàng", "e": "图书馆东边就是博物馆", "img": "🏛️"}, {"h": "人民广场", "p": "rénmínguǎngchǎng", "m": "quảng trường Nhân Dân", "e": "", "img": "📖"}, {"h": "拐", "p": "guǎi", "m": "rẽ", "e": "", "img": "↩️"}, {"h": "红绿灯", "p": "hónglǜdēng", "m": "đèn xanh đỏ", "e": "到红绿灯往右拐", "img": "🚦"}, {"h": "马路", "p": "mǎlù", "m": "đường cái", "e": "马路东边就是博物馆", "img": "🛣️"}, {"h": "座", "p": "zuò", "m": "tòa", "e": "前边有一座白色的大楼那就是博物馆", "img": "📖"}, {"h": "左边", "p": "zuǒbian", "m": "bên trái", "e": "图书馆在学校左边", "img": "⬅️"}, {"h": "远", "p": "yuǎn", "m": "xa", "e": "我家离公司很远", "img": "📍"}, {"h": "中间", "p": "zhōngjiān", "m": "ở giữa", "e": "银行在书店和超市中间", "img": "🔛"}, {"h": "往", "p": "wǎng", "m": "về phía, hướng", "e": "到红绿灯往右拐", "img": "➡️"}, {"h": "从", "p": "cóng", "m": "từ", "e": "从这儿往前走", "img": "🚩"}, {"h": "白色", "p": "báisè", "m": "màu trắng", "e": "前边有一座白色的大楼", "img": "⚪"}], "sentences": [{"zh": "前边是图书馆。", "vi": "Phía trước là thư viện.", "alt": []}, {"zh": "箱子里有书。", "vi": "Trong hộp có sách.", <script>
/* ============ Tiếng Trung 24G — App học tập (offline) v2 ============ */
'use strict';

// ---------- Lưu trữ ----------
const STORE = 'tt24g_progress';
const USER_KEY = 'tt24g_user';
function load(k, def) { try { return JSON.parse(localStorage.getItem(k)) || def; } catch { return def; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

let progress = load(STORE, {});
if (!progress.reviewed) progress.reviewed = 0;
if (!progress.srs) progress.srs = {};
if (!progress.scores) progress.scores = [];
if (!progress.aiLog) progress.aiLog = [];
let user = load(USER_KEY, null);

function saveProg() { save(STORE, progress); }

// ---------- Phát âm (tương thích iPhone/iOS Safari) ----------
let _voices = [];
let _zhVoice = null;
let _speechReady = false;
let _warnedNoVoice = false;
let _speechWaited = false;

function _loadVoices() {
  if (!window.speechSynthesis) return;
  _voices = window.speechSynthesis.getVoices() || [];
  const zhAll = _voices.filter(v => /zh[-_]CN/i.test(v.lang) || /^zh/i.test(v.lang) || /chinese|中文|普通话|mandarin/i.test(v.name));
  const FEMALE = /tingting|ting-ting|mei-?jia|sin-?ji|li-?mu|xiaoxiao|xiaoyi|huihui|yaoyao|female|woman|女/i;
  _zhVoice =
    zhAll.find(v => FEMALE.test(v.name) && /premium|enhanced|高质量/i.test(v.name)) ||
    zhAll.find(v => FEMALE.test(v.name)) ||
    zhAll.find(v => /premium|enhanced|高质量/i.test(v.name)) ||
    zhAll.find(v => /zh[-_]CN/i.test(v.lang)) ||
    zhAll[0] || null;
}
if (window.speechSynthesis) {
  _loadVoices();
  window.speechSynthesis.onvoiceschanged = _loadVoices;
}

// "Mở khóa" speechSynthesis — iOS VÀ Android đều cần kích hoạt trong thao tác chạm.
// KHÔNG dùng {once} để Android luôn được resume lại (Android hay tự pause hàng đợi).
function _unlockSpeech() {
  if (!window.speechSynthesis) return;
  try {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    if (!_speechReady) {
      const warm = new SpeechSynthesisUtterance(' ');
      warm.volume = 0; warm.lang = 'zh-CN';
      window.speechSynthesis.speak(warm);
      _speechReady = true;
    }
    _loadVoices();
  } catch (e) {}
}
document.addEventListener('touchstart', _unlockSpeech, { passive: true });
document.addEventListener('touchend', _unlockSpeech, { passive: true });
document.addEventListener('click', _unlockSpeech);

function _doSpeak(text, slow) {
  const ss = window.speechSynthesis;
  ss.cancel();
  if (ss.paused) ss.resume();
  const chars = [...text];
  const readSlow = slow !== false && chars.length <= 4;
  const speakOne = (t, rate, delay) => setTimeout(() => {
    try {
      if (ss.paused) ss.resume();
      const u = new SpeechSynthesisUtterance(t);
      u.lang = 'zh-CN'; u.rate = rate; u.pitch = 1;
      if (_zhVoice) u.voice = _zhVoice;
      ss.speak(u);
    } catch (e) {}
  }, delay);
  if (readSlow && chars.length > 1) {
    speakOne(text, 0.6, 60);
    let d = 60 + 700 * chars.length;
    chars.forEach((c) => { speakOne(c, 0.55, d); d += 750; });
  } else {
    speakOne(text, readSlow ? 0.55 : 0.85, 60);
  }
}

function speak(text, slow) {
  if (!window.speechSynthesis) {
    alert('Thiết bị này không hỗ trợ phát âm tự động.');
    return;
  }
  const POLY = { '还':'还有', '了':'好了', '少':'多少', '看':'看见', '行':'不行', '长':'很长', '只':'一只', '得':'觉得', '回':'回家' };
  if (POLY[text]) text = POLY[text];
  _unlockSpeech();
  // Android: getVoices() có thể rỗng lúc đầu -> đợi voices nạp xong rồi mới phát
  if ((!_voices || _voices.length === 0) && !_speechWaited) {
    _speechWaited = true;
    let tries = 0;
    const waiter = setInterval(() => {
      _loadVoices(); tries++;
      if ((_voices && _voices.length > 0) || tries > 10) {
        clearInterval(waiter);
        _doSpeak(text, slow);
      }
    }, 150);
    return;
  }
  _doSpeak(text, slow);
}

// ---------- Âm thanh phản hồi (đúng/sai) ----------
let _audioCtx = null;
function _actx() {
  if (!_audioCtx && (window.AudioContext || window.webkitAudioContext)) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}
// iOS: AudioContext có thể bị "suspend" lại bất cứ lúc nào -> mở khóa lại trên MỌI tương tác
function _unlockAudio() {
  const ctx = _actx();
  if (!ctx) return;
  try {
    if (ctx.state === 'suspended') ctx.resume();
    const o = ctx.createOscillator(), g = ctx.createGain();
    g.gain.value = 0; o.connect(g); g.connect(ctx.destination);
    o.start(0); o.stop(ctx.currentTime + 0.01);
  } catch (e) {}
}
// KHÔNG dùng {once:true} — gắn lâu dài để iOS luôn được mở khóa lại sau mỗi chạm
document.addEventListener('touchstart', _unlockAudio, { passive: true });
document.addEventListener('touchend', _unlockAudio, { passive: true });
document.addEventListener('click', _unlockAudio);

function _playFeedback(ctx, ok) {
  const t = ctx.currentTime + 0.02; // chừa thời gian sau resume
  if (ok) {
    // tiếng "tinh" vui (hai nốt chuông đi lên)
    [[880, t, 0.18], [1320, t + 0.13, 0.32]].forEach(([f, st, dur]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(f, st);
      g.gain.setValueAtTime(0.32, st);
      g.gain.exponentialRampToValueAtTime(0.001, st + dur);
      o.start(st); o.stop(st + dur);
    });
  } else {
    // tiếng "tòe tòe" báo sai (sóng vuông trầm, ngắt quãng 2 lần)
    [t, t + 0.18].forEach(st => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'square'; o.frequency.setValueAtTime(160, st);
      g.gain.setValueAtTime(0.24, st);
      g.gain.exponentialRampToValueAtTime(0.001, st + 0.16);
      o.start(st); o.stop(st + 0.16);
    });
  }
}
function feedbackSound(ok) {
  const ctx = _actx();
  if (!ctx) return;
  try {
    // iOS: nếu context đang suspended, resume rồi mới phát (resume bất đồng bộ)
    if (ctx.state === 'suspended') {
      ctx.resume().then(() => _playFeedback(ctx, ok)).catch(() => {});
    } else {
      _playFeedback(ctx, ok);
    }
  } catch (e) {}
}

function shuffle(a) { const x = a.slice(); for (let i = x.length-1; i>0; i--){ const j = Math.random()*(i+1)|0; [x[i],x[j]]=[x[j],x[i]]; } return x; }

const QUIZ_TYPES = ['choose', 'fill', 'match', 'translate'];

function sentencesFor(lessonN) {
  if (lessonN) return (lessonById(lessonN).sentences || []).map(s => ({...s, lesson:lessonN}));
  return DATA.lessons.flatMap(l => (l.sentences || []).map(s => ({...s, lesson:l.n})));

// Bài kiểm tra GỘP: từ vựng (4 dạng) + sắp xếp câu + dịch câu, tự động trộn.
function startTest(lessonN) {
  quizSource = lessonN;
  const pool = lessonN ? lessonById(lessonN).vocab.slice() : allVocab();
  const sents = sentencesFor(lessonN);

  // Phần từ vựng: 4 dạng. Lấy tối đa 8 câu hỏi từ.
  const wordPick = shuffle(pool).slice(0, Math.min(8, pool.length));
  const wordQs = wordPick.map((v, i) => ({ kind: 'word', v, type: QUIZ_TYPES[i % QUIZ_TYPES.length] }));

  // Phần câu: vừa sắp xếp vừa dịch. Mỗi câu hiện 1 dạng (trộn đều).
  const sentPick = shuffle(sents.slice());
  const sentQs = [];
  sentPick.forEach((s, i) => sentQs.push({ kind: 'sentence', s, type: i % 2 === 0 ? 'arrange' : 'sentence' }));
  const sentLimited = lessonN ? sentQs.slice(0, 10) : sentQs.slice(0, 6);

  quizList = shuffle([...wordQs, ...sentLimited]);
  if (quizList.length === 0) { document.getElementById('quiz-body').innerHTML = '<p class="sub">Bài này chưa đủ dữ liệu để kiểm tra.</p>'; return; }
  quizIdx = 0; quizScore = 0;
  startTestTimer(); // đếm ngược 6 phút
  renderQuiz();
}
// ===== Đồng hồ 6 phút cho Kiểm tra =====
let testTimer = null, testTimeLeft = 0, testEndAt = 0;
function startTestTimer() {
  testTimeLeft = 360; // 6 phút
  testEndAt = Date.now() + testTimeLeft * 1000; // mốc thời gian thực (đáng tin trên iOS)
  if (testTimer) clearInterval(testTimer);
  testTimer = setInterval(tickTimer, 500);
}
function tickTimer() {
  testTimeLeft = Math.max(0, Math.round((testEndAt - Date.now()) / 1000));
  updateTimerDisplay();
  if (testTimeLeft <= 0) { clearInterval(testTimer); testTimer = null; finishQuiz(true); }
}
function stopTestTimer() { if (testTimer) { clearInterval(testTimer); testTimer = null; } }
function updateTimerDisplay() {
  const el = document.getElementById('q-timer');
  if (!el) return;
  const m = Math.floor(testTimeLeft / 60), s = testTimeLeft % 60;
  el.textContent = '⏱️ ' + m + ':' + (s < 10 ? '0' : '') + s;
  el.className = 'q-timer' + (testTimeLeft <= 30 ? ' danger' : '');
}
const TYPE_LABEL = { choose:'Chọn nghĩa đúng', fill:'Điền chữ Hán', match:'Nối từ với nghĩa', translate:'Dịch từ Việt → Trung', arrange:'Sắp xếp thành câu', sentence:'Dịch câu Việt → Trung' };
function renderQuiz() {
  const body = document.getElementById('quiz-body');
  if (quizIdx >= quizList.length) return finishQuiz();
  const item = quizList[quizIdx];
  const head = '<div class="q-timer" id="q-timer"></div>' +
    '<div class="q-progress"><i style="width:' + (quizIdx/quizList.length*100) + '%"></i></div>' +
    '<div class="q-typebadge">' + TYPE_LABEL[item.type] + ' · Câu ' + (quizIdx+1) + '/' + quizList.length + '</div>';
  if (item.kind === 'sentence') {
    if (item.type === 'arrange') { body.innerHTML = head + qArrange(item.s); buildArrange(item.s); }
    else body.innerHTML = head + qSentence(item.s);
    updateTimerDisplay();
    return;
  }
  const q = item.v, type = item.type;
  if (type === 'choose') body.innerHTML = head + qChoose(q);
  else if (type === 'fill') body.innerHTML = head + qFill(q);
  else if (type === 'match') { body.innerHTML = head + qMatch(q); drawMatch(); }
  else body.innerHTML = head + qTranslate(q);
  updateTimerDisplay();
}
function qChoose(q) {
  const wrong = shuffle(allVocab().filter(v => v.m !== q.m)).slice(0, 3).map(v => v.m);
  const opts = shuffle([q.m, ...wrong]);

    '<div class="qp">' + esc(q.p) + ' <button class="spk sm" onclick="speak(\'' + esc(q.h) + '\')">🔊</button></div>' +
    '<div class="qq">Chữ này nghĩa là gì?</div></div><div class="opts" id="opts">' +
    opts.map(o => '<button class="opt" onclick="answerChoose(this,' + (o===q.m?1:0) + ')">' + esc(o) + '</button>').join('') +
    '</div><button class="q-next" id="qnext" onclick="nextQuiz()">Câu tiếp →</button></div>';
}

function qFill(q) {

function answerFill() {
  const q = quizList[quizIdx].v;
  const val = (document.getElementById('fillin').value || '').trim();
  const ok = val === q.h;

let matchState = null;

// Dạng 5: sắp xếp câu — xáo trộn các chữ/từ, học sinh chạm theo thứ tự đúng
let arrangeState = null;
function qArrange(s) {
  return '<div class="q-card"><div class="q-prompt">' +
    '<div class="qq" style="margin-top:0">Sắp xếp thành câu đúng:</div>' +
    '<div class="trans-vi" style="font-size:17px">"' + esc(s.vi) + '"</div></div>' +
    '<div class="arrange-answer" id="arr-ans"></div>' +
    '<div class="arrange-pool" id="arr-pool"></div>' +
    '<div class="q-result" id="arr-res"></div>' +
    '<button class="q-check" id="arr-check" onclick="checkArrange()">Kiểm tra</button>' +
    '<button class="q-next" id="qnext" onclick="nextQuiz()">Câu tiếp →</button></div>';
}
function buildArrange(s) {
  // tách câu thành các "token": ưu tiên gom từ vựng, còn lại theo ký tự
  let tokens = tokenizeSentence(s.zh);
  // mục 9: nếu câu ra quá ít ô (1 từ như 对不起), tách hẳn thành từng chữ để học sinh sắp xếp
  if (tokens.length < 2) {
    tokens = [...s.zh.replace(/[。？！，]/g, '')];
  }
  arrangeState = { correct: tokens, chosen: [], pool: shuffle(tokens.map((t, i) => ({ t, i }))) };
  drawArrange();
}
function tokenizeSentence(zh) {
  // GIỮ dấu câu (。？！，、) làm token riêng để học sinh sắp xếp đúng cả dấu câu
  const vocabSet = new Set(allVocab().map(v => v.h).filter(h => [...h].length >= 2));
  const chars = [...zh.trim()];
  const out = [];
  let i = 0;
  while (i < chars.length) {
    const c = chars[i];
    if (/[。？！，、；：]/.test(c)) { out.push(c); i++; continue; } // dấu câu = 1 ô riêng
    if (/\s/.test(c)) { i++; continue; }
    let matched = null;
    for (let len = 3; len >= 2; len--) {
      const cand = chars.slice(i, i + len).join('');
      if (vocabSet.has(cand)) { matched = cand; break; }
    }
    if (matched) { out.push(matched); i += [...matched].length; }
    else { out.push(chars[i]); i++; }
  }
  return out;
}
function drawArrange() {
  const ans = document.getElementById('arr-ans'), pool = document.getElementById('arr-pool');
  if (!ans || !pool) return;
  ans.innerHTML = arrangeState.chosen.length
    ? arrangeState.chosen.map((c, k) => '<button class="tok tok-ans hanzi" onclick="unpickArrange(' + k + ')">' + esc(c.t) + '</button>').join('')
    : '<span class="arr-placeholder">Chạm các ô bên dưới theo thứ tự…</span>';
  pool.innerHTML = arrangeState.pool.map((c) =>
    '<button class="tok hanzi' + (c.used ? ' used' : '') + '" ' + (c.used ? 'disabled' : '') + ' onclick="pickArrange(' + c.i + ')">' + esc(c.t) + '</button>').join('');
}
function pickArrange(idx) {
  const item = arrangeState.pool.find(c => c.i === idx && !c.used);
  if (!item) return;
  item.used = true; arrangeState.chosen.push(item); drawArrange();
}
function unpickArrange(k) {
  const item = arrangeState.chosen.splice(k, 1)[0];
  if (item) item.used = false;
  drawArrange();
}
function checkArrange() {
  const result = arrangeState.chosen.map(c => c.t).join('');
  const target = arrangeState.correct.join('');
  const ok = result === target;
  if (ok) quizScore++;

function qSentence(s) {

    '<button class="q-check" id="sentcheck" onclick="answerSentence()">Kiểm tra</button>' +

// Chuẩn hóa câu để so khớp: bỏ dấu câu/khoảng trắng, đồng nhất các biến thể tương đương.
function normSentence(x) {
  let s = (x || '').replace(/[\s。，、！？,.!?]/g, '');
  // đồng nhất 有一点儿 = 有点儿 = 有一点 = 有点 ; 一点儿 = 一点 ; 点儿 = 点
  s = s.replace(/有一点儿/g, '有点').replace(/有点儿/g, '有点').replace(/有一点/g, '有点');
  s = s.replace(/一点儿/g, '一点').replace(/点儿/g, '点');
  // 你 = 您
  s = s.replace(/您/g, '你');
  // 看书 = 读书 (đọc sách) ; chuẩn hóa về 看书
  s = s.replace(/读书/g, '看书');
  // Từ lặp âm tiết: 常常=常, 看看=看, 想想=想, 说说=说... (AA -> A) để cả 1 và 2 chữ đều đúng
  s = s.replace(/([\u4e00-\u9fff])\1/g, '$1');
  return s;
}
// Sinh các hoán vị hợp lệ khi trạng từ thời gian đứng trước/sau chủ ngữ.
// Hỗ trợ cả cụm thời gian ghép: 每天早上, 每天晚上, 今天下午...
function timeWordVariants(zh) {
  const singles = ['今天', '昨天', '明天', '每天', '上午', '下午', '早上', '晚上', '中午', '最近', '现在', '平时', '有时候', '周末'];
  // cụm ghép thời gian (mỗi-ngày + buổi)
  const compounds = [];
  ['每天', '今天', '昨天', '明天'].forEach(a => ['早上', '上午', '中午', '下午', '晚上'].forEach(b => compounds.push(a + b)));
  const times = [...compounds, ...singles]; // thử cụm dài trước
  const pronouns = ['我们', '你们', '他们', '咱们', '我', '你', '您', '他', '她'];
  const out = new Set([zh]);
  for (const t of times) {
    for (const p of pronouns) {
      if (zh.startsWith(t + p)) out.add(p + t + zh.slice((t + p).length));
      if (zh.startsWith(p + t)) out.add(t + p + zh.slice((p + t).length));
    }
  }
  return [...out];
}
function sentenceMatches(input, target, alts) {
  const candidates = [target, ...(alts || [])];
  // mở rộng bằng hoán vị trạng từ thời gian
  const expanded = new Set();
  candidates.forEach(c => timeWordVariants(c).forEach(v => expanded.add(normSentence(v))));
  return expanded.has(normSentence(input));
}

function answerSentence() {

  document.getElementById('sentres').innerHTML = ok

function unpickExArr(k) { const c = exArr.chosen.splice(k, 1)[0]; if (c) c.used = false; drawExArrange(); }

  let blankTok = toks.slice().sort((a, b) => b.length - a.length)[0] || toks[0];
  exBlank = blankTok;
  const idx = s.zh.indexOf(blankTok);
  const before = esc(s.zh.slice(0, idx)), after = esc(s.zh.slice(idx + blankTok.length));
  const w = Math.max(2, [...blankTok].length) * 1.2;
  return '<div class="ex-q-label">✏️ Điền chữ Hán còn thiếu vào chỗ trống:</div>' +
    '<div class="q-prompt"><div class="q-vi">Nghĩa: ' + esc(s.vi) + '</div>' +
    '<div class="ex-line hanzi">' + before +
      '<input class="ex-inline" id="exin" style="width:' + w + 'em" autocomplete="off" autocapitalize="off" onkeydown="if(event.key===\'Enter\')answerExFill()"/>' +
      after + '</div></div>' +
    '<button class="q-check" id="excheck" onclick="answerExFill()">Kiểm tra</button>' +
    '<div class="q-result" id="exres"></div>' +
    '<button class="q-next" id="exnext" onclick="exNext()">Câu tiếp theo →</button>';
}
function answerExFill() {
  const inEl = document.getElementById('exin');
  if (!inEl || inEl.disabled) return;
  const val = (inEl.value || '').trim();
  const ok = val === exBlank || val.replace(/您/g,'你') === exBlank.replace(/您/g,'你');
  if (ok) exScore++;
  inEl.disabled = true; inEl.classList.add(ok ? 'ex-ok' : 'ex-no');
  document.getElementById('excheck').style.display = 'none';
  document.getElementById('exres').innerHTML = ok
    ? '<div class="res-ok">✓ ' + praiseMsg() + '</div>'
    : '<div class="res-no">✗ ' + encourageMsg() + ' Đáp án: <b class="hanzi">' + esc(exBlank) + '</b></div>';
  feedbackSound(ok);
  document.getElementById('exnext').classList.add('show');
}

function clampN(x, a, b){ x = +x; if (isNaN(x)) x = 0; return Math.max(a, Math.min(b, x)); }

function logAi(entry){
  if (!progress.aiLog) progress.aiLog = [];
  entry.when = Date.now(); entry.name = (user&&user.name)||'?'; entry.cls = (user&&user.cls)||'?';
  progress.aiLog.push(entry);
  if (progress.aiLog.length > 600) progress.aiLog = progress.aiLog.slice(-600);
  saveProg();
  cloudSubmit(entry);
}

let spLesson = null, spMode = 'sent', spItems = [];
let spSession = {};
let recognizer = null, recTranscript = '', recInterim = '', srErr = null, recActiveId = null, _recT0 = 0;
const _pitchData = [];

function spStatsCard(){
  const list=(progress.aiLog||[]).filter(x=>x.kind==='pron'&&x.name===((user&&user.name)||''));
  if(!list.length) return '';
  const n=list.length;
  const errs=list.reduce((s,x)=>s+((x.errChars||[]).join('').match(/[一-鿿]/g)||[]).length,0);
  const avg=Math.round(list.reduce((s,x)=>s+(x.score||0),0)/n);
  return '<div class="tc-stat"><div class="tcs"><div class="tcs-n">'+n+'</div><div class="tcs-l">câu đã đọc</div></div><div class="tcs"><div class="tcs-n">'+errs+'</div><div class="tcs-l">lỗi tích lũy</div></div><div class="tcs"><div class="tcs-n">'+avg+'</div><div class="tcs-l">điểm TB</div></div></div>';
}
function renderSpeakStart(){ if (!spLesson) spLesson = (currentLesson || (DATA.lessons[0]&&DATA.lessons[0].n) || 16); renderSpeak(); }
function spPick(n){ spLesson = n; renderSpeak(); }
function spSetMode(m){ spMode = m; renderSpeak(); }
function renderSpeak(){
  const el = document.getElementById('speak');
  const L = lessonById(spLesson);
  const lessons = DATA.lessons.map(l => '<button class="pill' + (l.n === spLesson ? ' on' : '') + '" onclick="spPick(' + l.n + ')">Bài ' + l.n + '</button>').join('');
  const seg = '<div class="seg">' +
    '<button class="' + (spMode==='full'?'on':'') + '" onclick="spSetMode(\'full\')">📜 Đọc cả bài</button>' +
    '<button class="' + (spMode==='sent'?'on':'') + '" onclick="spSetMode(\'sent\')">📖 Từng câu</button>' +
    '<button class="' + (spMode==='word'?'on':'') + '" onclick="spSetMode(\'word\')">🔤 Từ vựng</button></div>';
  let body;
  if (spMode === 'full'){
    body = renderFullPanel(L);
  } else {
    spItems = (spMode === 'sent')
      ? (L.sentences || []).map(s => ({ zh: s.zh, py: '', vi: s.vi }))
      : (L.vocab || []).map(v => ({ zh: v.h, py: v.p, vi: v.m }));
    const items = spItems.length ? spItems.map((it, i) => spItemHTML(i, it)).join('') : '<p class="tc-empty">Bài này chưa có nội dung để luyện.</p>';

  el.innerHTML =

    spStatsCard() +
    '<div class="pill-row">' + lessons + '</div>' +
    seg + body;
}
function spItemHTML(i, it){
  return '<div class="sp-item" id="spit' + i + '">' +

    '</div>' +
    '<div class="sp-result" id="spres' + i + '" style="display:none"></div>' +
  '</div>';
}
function stopRec(){ if (recognizer){ try { recognizer.stop(); } catch(e){} } }
function spToggleRec(i){
  if (recActiveId !== null) { stopRec(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { const res=document.getElementById('spres'+i); res.style.display='block'; res.innerHTML='<div class="sp-fb" style="background:#FEF2F2;color:#B00016">Trình duyệt này chưa hỗ trợ nhận giọng nói. Hãy dùng <b>Chrome</b> (Android/máy tính) hoặc <b>Safari</b> mới.</div>'; return; }
  startSR(i);
}
function startSR(i){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recTranscript = ''; recInterim = ''; srErr = null; recActiveId = i; _recT0 = _now();
  const btn = document.getElementById('recbtn' + i);
  const res = document.getElementById('spres' + i);
  res.style.display = 'block';
  res.innerHTML = '<div class="note-line">🎙️ Đang nghe... đọc câu phía trên, xong bấm <b>Dừng &amp; chấm</b>.</div>';
  if (btn) { btn.classList.remove('rec'); btn.classList.add('recording'); btn.innerHTML = '⏹ Dừng & chấm'; }
  try {
    recognizer = new SR();
    recognizer.lang = 'zh-CN'; recognizer.continuous = true; recognizer.interimResults = true; recognizer.maxAlternatives = 1;
    recognizer.onresult = function(e){
      let fin = '', intt = '';
      for (let k = 0; k < e.results.length; k++){ const r = e.results[k]; if (r.isFinal) fin += r[0].transcript; else intt += r[0].transcript; }
      if (fin) recTranscript += fin;
      recInterim = intt;
      const live = (recTranscript + intt).trim();
      res.innerHTML = '<div class="note-line">🎙️ Đang nghe: <b class="hanzi" style="font-size:18px">' + esc(live || '…') + '</b></div>';
    };
    recognizer.onerror = function(e){ srErr = (e && e.error) || 'error'; };
    recognizer.onend = function(){ srFinish(i); };
    recognizer.start();
  } catch (err) { srErr = 'start'; srFinish(i); }
}
function srFinish(i){
  const btn = document.getElementById('recbtn' + i);
  if (btn) { btn.classList.remove('recording'); btn.classList.add('rec'); btn.innerHTML = '⏺ Ghi lại'; }
  recActiveId = null;
  const dur = _now() - _recT0;
  const err = srErr; srErr = null; recognizer = null;
  const res = document.getElementById('spres' + i);
  const transcript = (recTranscript || recInterim || '').trim();
  if (!transcript) { res.innerHTML = '<div class="sp-fb" style="background:#FEF2F2;color:#B00016">⚠️ ' + esc(srMsg(err)) + '</div>'; return; }
  const it = spItems[i];
  const r = scorePronDevice(transcript, it, dur);
  renderSpResult(i, r);
  logAi({ kind: 'pron', lesson: spLesson, target: it.zh, py: it.py, transcript: r.transcript || '', score: r.score, errChars: r.errChars || [], advice: r.advice || '', mode: 'device' });
  feedbackSound(r.score >= 70);
}
function srMsg(err){
  if (err === 'not-allowed' || err === 'service-not-allowed') return 'Chưa được cấp quyền micro. Khi trình duyệt hỏi hãy bấm "Cho phép" (Allow), rồi thử lại.';
  if (err === 'no-speech') return 'Chưa nghe thấy giọng. Hãy đọc to, rõ, gần micro rồi thử lại.';
  if (err === 'network') return 'Không kết nối được dịch vụ nhận giọng. Cần có mạng và nên mở app qua web (https).';
  if (err === 'audio-capture') return 'Không tìm thấy micro. Hãy kiểm tra micro của thiết bị.';
  return 'Chưa nhận được giọng nói. Hãy dùng Chrome, bật mạng, đọc to rõ rồi thử lại.';
}

// ----- Chấm điểm trên máy -----
function toneOf(py){
  const m = {'ā':1,'á':2,'ǎ':3,'à':4,'ē':1,'é':2,'ě':3,'è':4,'ī':1,'í':2,'ǐ':3,'ì':4,'ō':1,'ó':2,'ǒ':3,'ò':4,'ū':1,'ú':2,'ǔ':3,'ù':4,'ǖ':1,'ǘ':2,'ǚ':3,'ǜ':4};
  for (const ch of (py || '')){ if (m[ch]) return m[ch]; }
  return 0;
}
function speedScore(rate){
  if (rate <= 0) return 0;
  if (rate < 1.2) return Math.round(60 + rate/1.2*30);
  if (rate <= 3.0) return Math.round(90 + (rate-1.2)/1.8*10);
  if (rate <= 4.5) return Math.round(100 - (rate-3.0)/1.5*25);
  return Math.max(45, Math.round(75 - (rate-4.5)*10));
}
function voicedScore(pd){
  if (!pd || pd.length < 4) return 78;
  const v = pd.filter(function(p){ return p.rms > 0.012; }).length;
  return Math.max(50, Math.min(100, Math.round(55 + (v/pd.length)*45)));
}
function aspiratedTargets(zh){
  const out = [];
  normHan(zh).split('').forEach(function(c){
    const py = (pyOf(c) || '').toLowerCase();
    const a = ['ch','c','p','t','k','q'].find(function(x){ return py.indexOf(x) === 0; });
    if (a) out.push(c + ' (' + a + ')');
  });
  return out;
}
function estimateTone(zh){
  const chars = normHan(zh).split('');
  const expected = chars.map(function(c){ return toneOf(pyOf(c)); });
  const toneStr = chars.map(function(c,i){ return c + (expected[i] || ''); }).join(' ');
  return { score: 75, note: 'Thanh điệu chuẩn cần đọc: ' + toneStr + '.' };
}
function scorePronDevice(transcript, it, durationMs){
  const tgt = normHan(it.zh).split('');
  const syl = Math.max(1, tgt.length);
  let marks, acc, errChars;
  if (transcript){
    const got = normHan(transcript).split('');
    const matched = lcsMatch(tgt, got);
    marks = tgt.map(function(c,k){ return { c:c, st: matched[k] ? 'ok' : 'bad' }; });
    acc = Math.round(matched.filter(Boolean).length / syl * 100);
    errChars = marks.filter(function(m){ return m.st !== 'ok'; }).map(function(m){ return m.c; });
  } else {
    marks = tgt.map(function(c){ return { c:c, st:'miss' }; }); acc = 0; errChars = tgt.slice();
  }
  const sec = Math.max(0.3, (durationMs||0)/1000);
  const rate = syl / sec;
  const speed = speedScore(rate);
  const speedLabel = rate < 1 ? 'hơi chậm' : (rate <= 3.2 ? 'vừa phải' : 'khá nhanh');
  const tRes = estimateTone(it.zh);
  const tone = Math.round(60 + acc*0.4);
  const fluency = Math.max(0, Math.min(100, Math.round(acc*0.5 + speed*0.2 + voicedScore(_pitchData)*0.3)));
  const overall = Math.round(acc*0.45 + Math.min(speed,100)*0.15 + fluency*0.2 + tone*0.2);
  const advice = overall>=85 ? 'Rất tốt! Đọc rõ và đều.' : overall>=70 ? 'Đạt rồi! Chú ý các chữ tô đỏ.' : 'Cố lên! Nghe mẫu, đọc chậm & rõ từng chữ.';
  return { score: overall, transcript: transcript, charMarks: marks, errChars: errChars,
    sub: { acc:acc, speed:speed, speedLabel:speedLabel, fluency:fluency, tone:tone },
    toneNote: tRes.note, asp: aspiratedTargets(it.zh), advice: advice };
}
function subRow(s){
  if (!s) return '';
  function pill(lbl, val, extra){ const c = val>=80?'#059669':(val>=60?'#f59e0b':'#D9001B'); return '<div class="subm"><div class="subm-n" style="color:'+c+'">'+val+'</div><div class="subm-l">'+lbl+(extra?' · '+esc(extra):'')+'</div></div>'; }
  return '<div class="sub-row">' + pill('Đọc đúng', s.acc) + pill('Tốc độ', s.speed, s.speedLabel) + pill('Lưu loát', s.fluency) + pill('Thanh điệu', s.tone) + '</div>';
}
function lcsMatch(a, b){
  const n = a.length, m = b.length;
  const dp = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
  for (let i = 1; i <= n; i++) for (let j = 1; j <= m; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const matched = new Array(n).fill(false);
  let i = n, j = m;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) { matched[i-1] = true; i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--; else j--;
  }
  return matched;
}

  const aspBox = (r.asp && r.asp.length) ? '<div class="note-line">💨 Chú ý bật hơi mạnh ở: <b class="hanzi">' + r.asp.map(esc).join('、') + '</b></div>' : '';
  res.style.display = 'block';
  res.innerHTML =
    '<div class="sp-score"><div class="sp-score-num" style="color:' + col + '">' + r.score + '</div>' +

    aspBox +
    (r.advice ? '<div class="sp-fb">' + esc(r.advice) + '</div>' : '');

// ----- Đọc cả bài khóa (课文) — chấm theo câu -----
function stripKewenLines(text){
  return (text||'').split('\n').map(function(ln){
    var t = ln.replace(/（[^）]*）/g,'').replace(/\([^)]*\)/g,'');
    t = t.replace(/^[^：:\n]{1,10}[：:]\s*/, '');
    return t.trim();
  }).filter(function(t){ return /[一-鿿]/.test(t); });
}
function kewenLines(L){ if (L && L.kewen) return stripKewenLines(L.kewen); return (L&&L.sentences||[]).map(function(s){ return s.zh; }).filter(Boolean); }
function spSpeakFull(){ const L=lessonById(spLesson); const ls=kewenLines(L); if(ls.length) speak(ls.join('，')); }
function renderFullPanel(L){
  if (!L || (!L.kewen && !(L.sentences||[]).length)) return '<p class="tc-empty">Bài này chưa có bài khóa để đọc.</p>';
  let display;
  if (L.kewen){
    display = L.kewen.split('\n').map(function(ln){
      ln = ln.trim(); if(!ln) return '';
      const m = ln.match(/^([^：:]{1,10})[：:]\s*(.*)$/);
      if (m) return '<div class="kw-row"><span class="kw-spk">'+esc(m[1])+'</span><span class="hanzi">'+esc(m[2])+'</span></div>';
      return '<div class="kw-row kw-stage hanzi">'+esc(ln)+'</div>';
    }).join('');
  } else {
    display = (L.sentences||[]).map(function(s){ return '<div class="kw-row hanzi">'+esc(s.zh)+'</div>'; }).join('');
  }
  return '<div class="panel"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span class="lh-num">' + L.n + '</span>' +
      '<div><b class="hanzi" style="font-size:17px">' + esc(L.zh) + '</b><div class="note-line" style="margin:0">Bài khóa</div></div>' +
      '<button class="sp-btn" style="flex:0;min-width:118px;margin-left:auto" onclick="spSpeakFull()">🔊 Nghe cả bài</button></div>' +
    '<div class="note-line" style="margin-bottom:8px">📜 Đọc to toàn bộ bài khóa dưới đây (<b>không cần đọc tên nhân vật</b>), xong bấm <b>Dừng &amp; chấm</b>.</div>' +
    '<div class="kw-box">' + display + '</div></div>' +
    '<div class="pill-row"><button class="sp-btn rec" id="recbtnFULL" style="flex:1" onclick="fullToggleRec()">🎤 Ghi âm đọc cả bài</button></div>' +
    '<div id="spresFULL"></div>';
}
function fullToggleRec(){
  if (recActiveId !== null) { stopRec(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const res = document.getElementById('spresFULL');
  if (!SR) { res.innerHTML = '<div class="sp-fb" style="background:#FEF2F2;color:#B00016">Trình duyệt này chưa hỗ trợ nhận giọng nói. Hãy dùng <b>Chrome</b> hoặc <b>Safari</b> mới.</div>'; return; }
  fullStart();
}
function fullStart(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recTranscript = ''; recInterim = ''; srErr = null; recActiveId = 'full'; _recT0 = _now();
  const btn = document.getElementById('recbtnFULL');
  const res = document.getElementById('spresFULL');
  if (btn) { btn.classList.remove('rec'); btn.classList.add('recording'); btn.innerHTML = '⏹ Dừng & chấm'; }
  res.innerHTML = '<div class="note-line">🎙️ Đang nghe... đọc cả bài, xong bấm <b>Dừng &amp; chấm</b>.</div>';
  try {
    recognizer = new SR();
    recognizer.lang = 'zh-CN'; recognizer.continuous = true; recognizer.interimResults = true; recognizer.maxAlternatives = 1;
    recognizer.onresult = function(e){
      let fin = '', intt = '';
      for (let k = 0; k < e.results.length; k++){ const r = e.results[k]; if (r.isFinal) fin += r[0].transcript; else intt += r[0].transcript; }
      if (fin) recTranscript += fin;
      recInterim = intt;
      const live = (recTranscript + intt).trim();
      res.innerHTML = '<div class="note-line">🎙️ Đang nghe: <b class="hanzi">' + esc(live.slice(-50) || '…') + '</b></div>';
    };
    recognizer.onerror = function(e){ srErr = (e && e.error) || 'error'; };
    recognizer.onend = function(){ fullFinish(); };
    recognizer.start();
  } catch (err) { srErr = 'start'; fullFinish(); }
}
function fullFinish(){
  const btn = document.getElementById('recbtnFULL');
  if (btn) { btn.classList.remove('recording'); btn.classList.add('rec'); btn.innerHTML = '🎤 Ghi âm đọc cả bài'; }
  recActiveId = null;
  const dur = _now() - _recT0;
  const err = srErr; srErr = null; recognizer = null;
  const res = document.getElementById('spresFULL'); if (!res) return;
  const transcript = (recTranscript || recInterim || '').trim();
  if (!transcript) { res.innerHTML = '<div class="sp-fb" style="background:#FEF2F2;color:#B00016">⚠️ ' + esc(srMsg(err)) + '</div>'; return; }
  const L = lessonById(spLesson);
  const lines = kewenLines(L);
  const r = scoreFull(lines, transcript, dur);
  res.innerHTML = renderFullResult(r);
  logAi({ kind: 'pron', lesson: spLesson, target: '【Cả bài】' + L.zh, py: '', transcript: transcript, score: r.overall, errChars: r.errChars, advice: r.advice, mode: 'device' });
  feedbackSound(r.overall >= 70);
}
function scoreFull(lines, transcript, durationMs){
  const lineChars = lines.map(function(ln){ return normHan(ln).split(''); });
  const allChars = [].concat.apply([], lineChars);
  const matched = lcsMatch(allChars, normHan(transcript).split(''));
  let idx = 0, totalOk = 0; const lineRes = [];
  for (let li = 0; li < lineChars.length; li++){
    const len = lineChars[li].length; let ok = 0; const wrong = [];
    for (let c = 0; c < len; c++){ if (matched[idx + c]) ok++; else wrong.push(lineChars[li][c]); }
    idx += len; totalOk += ok;
    lineRes.push({ text: lines[li], len: len, score: len ? Math.round(ok / len * 100) : 100, wrong: wrong });
  }
  const total = allChars.length || 1;
  const acc = Math.round(totalOk / total * 100);
  const sec = Math.max(0.5, (durationMs||0)/1000);
  const rate = total / sec;
  const speed = speedScore(rate);
  const speedLabel = rate < 1 ? 'hơi chậm' : (rate <= 3.2 ? 'vừa phải' : 'khá nhanh');
  const fluency = Math.max(0, Math.min(100, Math.round(acc*0.5 + speed*0.2 + voicedScore(_pitchData)*0.3)));
  const tone = Math.round(60 + acc*0.4);
  const overall = Math.round(acc*0.45 + Math.min(speed,100)*0.15 + fluency*0.2 + tone*0.2);
  const errChars = lineRes.reduce(function(a, x){ return a.concat(x.wrong); }, []);
  const weak = lineRes.filter(function(x){ return x.score < 70 && x.len >= 2; }).sort(function(a, b){ return a.score - b.score; });
  const advice = overall >= 85 ? 'Tuyệt vời! Đọc cả bài rõ và đều.' : overall >= 70 ? 'Đạt rồi! Chú ý các câu tô đỏ.' : 'Cố lên! Nghe mẫu rồi đọc lại chậm & rõ.';
  return { overall: overall, lines: lineRes, errChars: errChars, weak: weak, advice: advice,
    sub: { acc: acc, speed: speed, speedLabel: speedLabel, fluency: fluency, tone: tone } };
}

  return '<div class="panel"><div class="note-line" style="text-align:center;margin-bottom:8px">' + esc((user&&user.name)||'') + ' · Lớp ' + esc((user&&user.cls)||'') + ' · Bài ' + spLesson + '</div>' + trophy +

    '<div class="sp-fb">' + esc(r.advice) + '</div>' + weakBox + '</div>' +
    '<h2 class="sec-head">Chi tiết theo câu</h2>' + wrongLines;
}
